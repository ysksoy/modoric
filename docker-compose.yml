services:
  db:
    image: mysql:8.4
    container_name: lesson-reservation-db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: lesson_reservation
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
      TZ: Asia/Tokyo
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u app_user -papp_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build: .
    container_name: lesson-reservation-web
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://db:3306/lesson_reservation?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true&useSSL=false
      DB_USER: app_user
      DB_PASSWORD: app_password
    ports:
      - "8080:8080"

volumes:
  db-data:
